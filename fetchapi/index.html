<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario y Tabla</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="contenedor">

    <!-- FORMULARIO -->
    <div class="formulario">
        <h2>Agregar Datos</h2>
        <form id="formulario">

            <label>Nombre</label>
            <input type="text" id="nombre" required>

            <label>Email</label>
            <input type="email" id="email" required>

            <button type="submit">Agregar</button>
        </form>
    </div>

    <!-- TABLA -->
    <div class="tabla">
        <h2>Datos Ingresados</h2>
        <table id="tabla">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody>
                <!-- Aquí se agregan los datos -->
            </tbody>
        </table>
    </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
